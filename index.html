<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="pages/index.css">
  <title>Mesto Russia</title>
</head>
<body>
<div class="page">
  <header class="header">
    <a href="#" class="logo">
      <img src="images/logo.png" alt="Логотип" class="logo__image">
    </a>
  </header>
  <main class="main">
    <div class="about-person">
      <div class="person">
        <img src="images/Jacques-Yves_Cousteau.jpg" alt="Жак-Ив Кусто" class="person__image">
        <div class="person__data">
          <h2 class="person__name">Жак-Ив Кусто</h2>
          <h3 class="person__profession">Исследователь океана</h3>
          <button class="buttons__edit-person" type="button">Редактировать</button>
        </div>
      </div>
      <button class="buttons__add-place" type="button">Добавить место</button>
    </div>
    <div class="gallery">
      <div class="gallery__el">
        <img src="images/karachaevsk.jpg" alt="Карачаевск" class="gallery__image">
        <h4 class="gallery__el-header">Карачаевск</h4>
        <button class="buttons__like buttons__like_active" type="button">Лайк</button>
      </div>
      <div class="gallery__el">
        <img src="images/elbrus.png" alt="Гора Эльбрус" class="gallery__image">
        <h4 class="gallery__el-header">Гора Эльбрус</h4>
        <button class="buttons__like" type="button">Лайк</button>
      </div>
      <div class="gallery__el">
        <img src="images/dombai.png" alt="Домбай" class="gallery__image">
        <h4 class="gallery__el-header">Домбай</h4>
        <button class="buttons__like" type="button">Лайк</button>
      </div>
      <div class="gallery__el">
        <img src="images/elbrus.png" alt="Гора Эльбрус" class="gallery__image">
        <h4 class="gallery__el-header">Гора Эльбрус</h4>
        <button class="buttons__like" type="button">Лайк</button>
      </div>
      <div class="gallery__el">
        <img src="images/dombai.png" alt="Домбай" class="gallery__image">
        <h4 class="gallery__el-header">Домбай</h4>
        <button class="buttons__like" type="button">Лайк</button>
      </div>
      <div class="gallery__el">
        <img src="images/karachaevsk.jpg" alt="Карачаево-Черкесская Республика" class="gallery__image">
        <h4 class="gallery__el-header">Карачаево-Черкесская Республика</h4>
        <button class="buttons__like" type="button">Лайк</button>
      </div>
    </div>
  </main>
  <footer class="footer">
    <p class="copyright">&copy; 2020 Mesto Russia</p>
  </footer>

  <div class="modal-edit-profile">
    <h2 class="modal-edit-profile__header">Редактировать&nbsp;профиль</h2>
    <form action="POST" class="modal-edit-profile__form" name="edit-profile">
      <input type="text" placeholder="Имя" class="modal-edit-profile__input-text" name="name">
      <input type="text" placeholder="Профессия" class="modal-edit-profile__input-text" name="profession">
      <button type="submit" class="modal-edit-profile__submit">Сохранить</button>
    </form>
  </div>
</div>
</body>
</html>
