<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="pages/index.css">
  <title>Mesto Russia</title>
</head>
<body>
<div class="page">
  <header class="header">
    <a href="#" class="logo">
      <img src="images/logo.svg" alt="Логотип" class="logo__image">
    </a>
  </header>
  <main class="main">
    <section class="about-person">
        <img src="images/Jacques-Yves_Cousteau.jpg" alt="Жак-Ив Кусто" class="about-person__image">
        <div class="about-person__data">
          <h1 class="about-person__name">Жак-Ив Кусто</h1>
          <p class="about-person__profession">Исследователь океана</p>
          <button class="about-person__edit-person" type="button">Редактировать</button>
        </div>
      <button class="about-person__add-place" type="button">Добавить место</button>
    </section>
    <section class="gallery">
      <div class="gallery__el">
        <img src="images/karachaevsk.jpg" alt="Карачаевск" class="gallery__image">
        <h3 class="gallery__el-header">Карачаевск</h3>
        <button class="gallery__like gallery__like_active" type="button">Лайк</button>
      </div>
      <div class="gallery__el">
        <img src="images/elbrus.png" alt="Гора Эльбрус" class="gallery__image">
        <h3 class="gallery__el-header">Гора Эльбрус</h3>
        <button class="gallery__like" type="button">Лайк</button>
      </div>
      <div class="gallery__el">
        <img src="images/dombai.png" alt="Домбай" class="gallery__image">
        <h3 class="gallery__el-header">Домбай</h3>
        <button class="gallery__like" type="button">Лайк</button>
      </div>
      <div class="gallery__el">
        <img src="images/elbrus.png" alt="Гора Эльбрус" class="gallery__image">
        <h3 class="gallery__el-header">Гора Эльбрус</h3>
        <button class="gallery__like" type="button">Лайк</button>
      </div>
      <div class="gallery__el">
        <img src="images/dombai.png" alt="Домбай" class="gallery__image">
        <h3 class="gallery__el-header">Домбай</h3>
        <button class="gallery__like" type="button">Лайк</button>
      </div>
      <div class="gallery__el">
        <img src="images/karachaevsk.jpg" alt="Карачаево-Черкесская Республика" class="gallery__image">
        <h3 class="gallery__el-header">Карачаево-Черкесская Республика</h3>
        <button class="gallery__like" type="button">Лайк</button>
      </div>
    </section>
  </main>
  <footer class="footer">
    <p class="footer__copyright">&copy; 2020 Mesto Russia</p>
  </footer>

  <div class="popup popup_closed">
    <div class="popup__container">
      <h2 class="popup__header">Редактировать&nbsp;профиль</h2>
      <form action="POST" class="popup__form" name="edit-profile">
        <input type="text" placeholder="Имя" class="popup__input-text" name="name">
        <input type="text" placeholder="Профессия" class="popup__input-text" name="profession">
        <button type="submit" class="popup__submit">Сохранить</button>
      </form>
      <button class="popup__close">Закрыть</button>
    </div>
  </div>
</div>
</body>
</html>
